<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MAARU 團購專區</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f7f9fc;
}

.header{
padding:20px;
background:#111827;
color:white;
text-align:center;
font-size:20px;
font-weight:bold;
}

.tabs{
display:flex;
gap:10px;
padding:10px;
justify-content:center;
}

.tabs button{
padding:8px 16px;
border-radius:20px;
border:none;
cursor:pointer;
background:#e5e7eb;
}

.tabs button.active{
background:#111827;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.tag-limit{
background:#ef4444;
color:white;
padding:4px 8px;
border-radius:12px;
font-size:12px;
display:inline-block;
}

.tag-normal{
background:#10b981;
color:white;
padding:4px 8px;
border-radius:12px;
font-size:12px;
display:inline-block;
}

.image-box{
position:relative;
height:220px;
overflow:hidden;
border-radius:12px;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
}

.style-options{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.style-options button{
padding:5px 10px;
border-radius:10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.qty{
margin-top:10px;
}

.cart-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111827;
color:white;
padding:12px;
text-align:center;
}

.cart-bar button{
background:white;
color:#111827;
padding:8px 16px;
border-radius:20px;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
MAARU 團購專區
</div>

<div class="tabs">
<button class="active" onclick="filterGroup('all')">全部</button>
<button onclick="filterGroup('limit')">限購團</button>
<button onclick="filterGroup('normal')">一般團</button>
</div>

<div class="grid" id="productGrid"></div>

<div class="cart-bar">
購物車 <span id="cartCount">0</span> 件
<button onclick="copyOrder()">複製訂單到 LINE</button>
</div>

<script>
const products = [
{
group:"limit",
name:"花小兔愛心扣吊飾",
arrival:"預計 4 月中到貨",
notice:"限購每人1件",
features:"超可愛愛心扣設計",
images:{
"A":["img/a1.jpg","img/a2.jpg","img/a3.jpg"],
"B":["img/b1.jpg","img/b2.jpg","img/b3.jpg"]
}
},
{
group:"normal",
name:"布丁狗手機鏈",
arrival:"預計 4 月底到貨",
notice:"一般團購",
features:"可拆式掛繩設計",
images:{
"黃款":["img/c1.jpg","img/c2.jpg","img/c3.jpg"],
"藍款":["img/d1.jpg","img/d2.jpg","img/d3.jpg"]
}
}
];

let cart = [];

function renderProducts(filter="all"){
const grid = document.getElementById("productGrid");
grid.innerHTML="";

products.forEach((p,index)=>{
if(filter!=="all" && p.group!==filter) return;

const firstStyle = Object.keys(p.images)[0];
const firstImage = p.images[firstStyle][0];

let card = document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="${p.group==='limit'?'tag-limit':'tag-normal'}">
${p.group==='limit'?'限購團':'一般團'}
</div>

<div class="image-box">
<img id="img-${index}" src="${firstImage}">
</div>

<h3>${p.name}</h3>
<p>${p.features}</p>
<p>到貨時間：${p.arrival}</p>
<p style="color:red;">${p.notice}</p>

<div class="style-options">
${Object.keys(p.images).map(style=>
`<button onclick="changeImage(${index},'${style}')">${style}</button>`
).join("")}
</div>

<div class="qty">
數量：
<input type="number" id="qty-${index}" value="1" min="1" style="width:60px;">
<button onclick="addToCart(${index})">加入購物車</button>
</div>
`;

grid.appendChild(card);
});
}

function changeImage(index,style){
const img = document.getElementById(`img-${index}`);
img.src = products[index].images[style][0];
products[index].selectedStyle = style;
}

function addToCart(index){
const qty = document.getElementById(`qty-${index}`).value;
const product = products[index];

cart.push({
group:product.group,
name:product.name,
style:product.selectedStyle || Object.keys(product.images)[0],
qty:qty
});

document.getElementById("cartCount").innerText = cart.length;
}

function copyOrder(){
let text = "@MAARU 官方\n\n我要跟以下團購：\n\n";
cart.forEach(item=>{
text += `【${item.group==='limit'?'限購團':'一般團'}】${item.name}\n款式：${item.style}\n數量：${item.qty}\n\n`;
});

navigator.clipboard.writeText(text);
alert("已複製，請貼到官方LINE");
}

function filterGroup(type){
renderProducts(type);
}

renderProducts();
</script>

</body>
</html>
